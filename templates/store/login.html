{% extends 'store/base.html' %} {% block content %}

<div class="row justify-content-center">
  <div class="col-md-4">
    <div class="card shadow-sm">
      <div class="card-header" style="background: #1c5253; color: #f3ffc6">
        <h5 class="mb-0">Login to Trendzy</h5>
      </div>
      <div class="card-body">
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label" style="color: #1c5253">Username</label>
            <input type="text" name="username" class="form-control" required />
          </div>
          <div class="mb-3">
            <label class="form-label" style="color: #1c5253">Password</label>
            <input
              type="password"
              name="password"
              class="form-control"
              required
            />
          </div>
          <button class="btn btn-trendzy w-100 fw-bold">Login</button>
        </form>
        <p class="mt-3 text-center text-muted">
          New here?
          <a href="{% url 'register' %}" style="color: #1c5253"
            >Create Account</a
          >
        </p>
      </div>
    </div>
  </div>
</div>

{% endblock %}
